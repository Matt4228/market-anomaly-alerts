<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Anomaly Alerts</title>
<link rel="icon" type="image/png" href="/static/window-icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    color-scheme: dark;
    /* Bloomberg-terminal-inspired palette, dialed back from the real thing:
       true-black field, amber as the primary "terminal" voice for labels/
       symbols, green/red kept for up/down and alert severity (already the
       convention every trading UI trains people to expect). */
    --bg: #000000;
    --bg-panel: #0a0a0a;
    --bg-card: #0d0d0d;
    --border: #2a2a2a;
    --border-amber: #4a3a10;
    --text: #d8d8d0;
    --text-dim: #7a7a72;
    --amber: #ffa500;
    --amber-bright: #ffc966;
    --green: #00d964;
    --red: #ff4136;
    --blue: #4da6ff;
  }
  /* Without this, any element with both an explicit width and padding
     (e.g. the mobile ticker cards: width:100% + padding:1rem) renders
     wider than its container - padding adds on top of the width instead
     of being included in it. Classic, easy-to-miss overflow cause. */
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: "Cascadia Code", "SF Mono", "Roboto Mono", Consolas, ui-monospace, monospace;
    max-width: 1080px;
    margin: 2rem auto;
    padding: 0 1rem;
    background: var(--bg);
    color: var(--text);
  }
  h1 {
    font-size: 1.3rem; margin-bottom: 0.4rem; color: var(--amber);
    letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700;
    padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-amber);
  }
  .sub {
    color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1.5rem;
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem;
  }
  .status {
    display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 0.78rem;
    border: 1px solid; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .status.connected { background: #001a0a; color: var(--green); border-color: var(--green); }
  .status.disconnected { background: #1a0505; color: var(--red); border-color: var(--red); }
  table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
  #ticker-table { font-size: 0.85rem; }
  th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  th {
    color: var(--amber); font-weight: 600; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--border-amber);
    white-space: nowrap;
  }
  tbody tr:hover { background: #0f0d05; }
  tr.flash { animation: flash 1.2s ease-out; }
  @keyframes flash { from { background: #331a00; } to { background: transparent; } }
  .zscore-hot { color: var(--red); font-weight: 700; }
  #alerts { list-style: none; padding: 0; margin: 0; }
  #alerts li { padding: 0.6rem 0.75rem; border-left: 3px solid var(--red); background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--red); margin-bottom: 0.5rem; border-radius: 2px; font-size: 0.88rem; }
  #alerts li .ts { color: var(--text-dim); font-size: 0.72rem; display: block; margin-top: 2px; }
  #alerts li.alert-item { cursor: pointer; transition: background-color 0.15s ease, color 0.15s ease; }
  #alerts li.alert-item:hover { color: var(--amber-bright); background-color: #150f00; }
  .empty { color: var(--text-dim); font-style: italic; font-size: 0.9rem; }
  .test-btn {
    font-family: inherit; font-size: 0.72rem; padding: 3px 8px; border-radius: 2px; border: 1px solid var(--border-amber);
    background: var(--bg-panel); color: var(--amber); cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .test-btn:hover { background: var(--amber); color: #000; }
  .test-btn:disabled { opacity: 0.4; cursor: default; background: var(--bg-panel); color: var(--text-dim); }
  .ticker-link {
    cursor: pointer; font-weight: 700; color: var(--amber); padding: 2px 8px; border-radius: 2px;
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  .ticker-link:hover { background-color: var(--amber); color: #000; }
  .spinner {
    display: inline-block; width: 20px; height: 20px; border: 3px solid var(--border);
    border-top-color: var(--amber); border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-block {
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    min-height: 140px; color: var(--text-dim); font-size: 0.85rem;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border-amber); border-radius: 3px; padding: 1.5rem;
    max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative;
  }
  .modal h3 { margin-top: 0; color: var(--amber); text-transform: uppercase; letter-spacing: 0.04em; font-size: 1rem; }
  .modal-close {
    position: absolute; top: 0.75rem; right: 0.9rem; background: none; border: none;
    color: var(--text-dim); font-size: 1.3rem; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--amber); }
  .range-btn {
    font-family: inherit; font-size: 0.72rem; padding: 3px 10px; border-radius: 2px; border: 1px solid var(--border-amber);
    background: var(--bg-panel); color: var(--amber); cursor: pointer; margin-right: 4px; text-transform: uppercase;
  }
  .range-btn.active { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 700; }
  .modal-section { margin-top: 1rem; }
  .modal table { width: 100%; table-layout: fixed; }
  .modal table td { word-break: break-word; }
  .modal input[type="number"] {
    width: 100%; box-sizing: border-box; background: var(--bg); border: 1px solid var(--border-amber);
    color: var(--text); border-radius: 2px; padding: 4px 8px; font-family: inherit;
  }
  .modal .mini-card table { table-layout: auto; } /* dividends: content is short, auto fits better */

  /* Mobile: Transient.AI is mobile-first, so this isn't an afterthought -
     roughly 25-50% bigger touch targets/text throughout, and the ticker
     table becomes stacked cards (an 8-column table + 4 buttons per row
     can't work at any font size on a ~375px screen, only a structural
     change fixes that). Desktop layout above is completely untouched. */
  @media (max-width: 640px) {
    body { font-size: 1.05rem; padding: 0 0.75rem; overflow-x: hidden; }
    h1 { font-size: 1.75rem; }
    .sub { font-size: 1rem; }
    .sub-full-text { display: none; } /* keep status + buttons, drop the descriptive sentence */

    .ticker-link { padding: 6px 12px; font-size: 1.05rem; }
    .test-btn { padding: 10px 12px; font-size: 0.95rem; }
    .status { padding: 4px 10px; font-size: 0.9rem; }

    /* Ticker table -> stacked cards, 2 columns of stats per card. Scoped
       to #ticker-table specifically - NOT a bare table/tbody/tr/td rule -
       so modal tables (dividends, settings, alert context) keep their
       normal compact appearance instead of also being cardified. */
    #ticker-table { display: block; width: 100%; border-collapse: separate; border-spacing: 0; }
    #ticker-table thead { display: none; }
    #ticker-table tbody, #ticker-table tr { display: block; width: 100%; }
    #ticker-table tbody tr {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem 1rem;
      background: var(--bg-card); border: 1px solid var(--border-amber); border-radius: 3px;
      margin-bottom: 1rem; padding: 1rem; width: 100%;
    }
    #ticker-table tbody td {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: none; padding: 0.3rem 0; font-size: 0.8rem;
      min-width: 0; /* grid items don't shrink below content size by default */
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    #ticker-table tbody td:first-child {
      grid-column: 1 / -1;
      font-size: 1.1rem; font-weight: 700; justify-content: flex-start;
      padding-bottom: 0.6rem; margin-bottom: 0.2rem; border-bottom: 1px solid var(--border);
    }
    #ticker-table tbody td[data-label]::before {
      content: attr(data-label); color: var(--text-dim); font-weight: 500; font-size: 0.68rem;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    #ticker-table tbody td[data-label="Test Alerts"] {
      grid-column: 1 / -1;
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
      padding-top: 0.6rem; margin-top: 0.2rem; border-top: 1px solid var(--border);
    }
    #ticker-table tbody td[data-label="Test Alerts"]::before {
      grid-column: 1 / -1; text-align: center; margin-bottom: 0.2rem;
    }
    #ticker-table tbody td[data-label="Test Alerts"] .test-btn {
      width: 100%; min-width: 0; overflow: hidden; text-overflow: ellipsis;
    }

    /* Dividends: one compact card, not one card per row */
    .mini-card {
      background: var(--bg-card); border: 1px solid var(--border-amber); border-radius: 3px; padding: 0.85rem;
    }

    /* Modals: wider, bigger inputs (16px minimum stops iOS auto-zoom-on-focus) */
    .modal { width: 95%; padding: 1.25rem; }
    .modal h3 { font-size: 1.3rem; }
    input, .range-btn { font-size: 16px; }
    .range-btn { padding: 8px 14px; }
    .modal-close { font-size: 1.6rem; }

    .ticker-link svg { stroke-width: 2.75; }
  }
</style>
</head>
<body>
  <h1>Market Anomaly Alerts</h1>
  <div class="sub">
    <span class="sub-full-text">Live prices update every poll cycle |</span>
    <span id="conn" class="status disconnected">connecting…</span>
    | <span class="ticker-link" onclick="openEditTickersModal()">Edit Tickers</span>
    | <span class="ticker-link" onclick="openSettingsModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px;"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Settings</span>
  </div>

  <table id="ticker-table">
    <thead>
      <tr><th>Ticker</th><th>Price</th><th>Baseline Mean</th><th>Volume</th><th>Spread</th><th>Z-Score</th><th>Samples</th><th>Test Alerts</th></tr>
    </thead>
    <tbody id="ticker-rows"></tbody>
  </table>

  <h2 style="font-size: 1.1rem;">Alerts</h2>
  <ul id="alerts"><li class="empty">No alerts yet.</li></ul>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

<script>
const rows = {};
// Baked in at deploy time for the dashboard's own test buttons to work.
// This means it's visible via view-source - good enough to stop casual/
// automated hits on the endpoint, not a substitute for real auth.
const DEBUG_TOKEN = "__DEBUG_TOKEN__";

// Draws a dashed vertical guide at the hovered x-position, top to bottom of
// the chart area - paired with interaction:{mode:"index",intersect:false}
// on each chart so the tooltip triggers from x-position alone, not from
// needing to hover precisely on the line itself.
Chart.register({
  id: "verticalHoverLine",
  afterDraw(chart) {
    const active = chart.tooltip?._active;
    if (!active || !active.length) return;
    const { ctx, chartArea } = chart;
    const x = active[0].element.x;
    ctx.save();
    ctx.beginPath();
    ctx.setLineDash([4, 4]);
    ctx.moveTo(x, chartArea.top);
    ctx.lineTo(x, chartArea.bottom);
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#7a7a72";
    ctx.stroke();
    ctx.restore();
  },
});

function fmtNum(n, digits = 2) {
  return typeof n === "number" ? n.toFixed(digits) : "-";
}

// price_history timestamps are stored genuinely in UTC (datetime.now(timezone.utc)
// in app/ingestion.py) - this converts to Eastern time for display (DST-aware via
// the browser's timezone database, not a naive fixed offset) and drops
// seconds/fractional-seconds/the "+00:00" suffix. Ticker-history chart dates
// (from OpenBB/yfinance) are a different case: they come back already
// timezone-naive but already localized to market time (verified: intraday bars
// start at "09:30:00", matching NYSE open) - applying this same conversion to
// those would incorrectly shift them again, so this is only used for
// price_history-derived dates (the alert detail chart), not ticker history.
function fmtEasternDate(utcString) {
  const d = new Date(utcString.replace(" ", "T"));
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York",
    month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false,
  }).formatToParts(d);
  const get = (type) => parts.find((p) => p.type === type)?.value;
  return `${get("month")}/${get("day")} ${get("hour")}:${get("minute")}`;
}

// Ticker-history dates (1D/1W ranges) are already correctly localized (see
// note above) so this is pure string trimming, not a Date/timezone
// conversion - no risk of double-shifting an already-correct value. Strips
// trailing ":SS" from "YYYY-MM-DD HH:MM:SS"; leaves date-only strings
// (1M/3M/1Y ranges, no time component) untouched.
function fmtProviderDate(dateStr) {
  return dateStr.replace(/:\d{2}$/, "");
}

async function initTable() {
  const { tickers } = await (await fetch("/tickers")).json();
  const tbody = document.getElementById("ticker-rows");
  tbody.innerHTML = "";
  for (const t of tickers) {
    const tr = document.createElement("tr");
    tr.id = "row-" + t;
    tr.innerHTML = `<td><span class="ticker-link" data-ticker="${t}">${t}</span></td><td class="price" data-label="Price">-</td><td class="mean" data-label="Baseline Mean">-</td><td class="volume" data-label="Volume">-</td><td class="spread" data-label="Spread">-</td><td class="z" data-label="Z-Score">-</td><td class="count" data-label="Samples">-</td><td data-label="Test Alerts">
      <button class="test-btn" data-ticker="${t}" data-kind="price">Price</button>
      <button class="test-btn" data-ticker="${t}" data-kind="volume">Volume</button>
      <button class="test-btn" data-ticker="${t}" data-kind="spread">Spread</button>
      <button class="test-btn" data-ticker="${t}" data-kind="volatility">Volatility</button>
    </td>`;
    tbody.appendChild(tr);
    rows[t] = tr;
    refreshBaseline(t);
  }
}

async function refreshBaseline(ticker) {
  const b = await (await fetch(`/tickers/${ticker}/baseline`)).json();
  const tr = rows[ticker];
  if (!tr) return;
  tr.querySelector(".mean").textContent = fmtNum(b.mean);
  tr.querySelector(".count").textContent = b.sample_count ?? "0";

  // Backfills price/volume/spread/z-score immediately on page load/refresh
  // instead of leaving them blank until the next WebSocket broadcast - all
  // of this is already sitting in the baseline row.
  if (typeof b.last_price === "number") {
    tr.querySelector(".price").textContent = fmtNum(b.last_price);
  }
  if (typeof b.last_volume === "number") {
    tr.querySelector(".volume").textContent = b.last_volume.toLocaleString();
  }
  if (typeof b.last_spread === "number") {
    tr.querySelector(".spread").textContent = fmtNum(b.last_spread, 3);
  }
  if (typeof b.z_score === "number") {
    const zEl = tr.querySelector(".z");
    zEl.textContent = fmtNum(b.z_score, 1);
    zEl.className = "z" + (b.z_score >= 3 ? " zscore-hot" : "");
  }
}

async function loadAlerts() {
  const alerts = await (await fetch("/alerts")).json();
  const ul = document.getElementById("alerts");
  ul.innerHTML = "";
  if (alerts.length === 0) {
    ul.innerHTML = '<li class="empty">No alerts yet.</li>';
    return;
  }
  // /alerts already comes back newest-first; prependAlert inserts at the top,
  // so looping forward would reverse it. Loop in reverse instead, so the
  // real newest alert is the last one prepended and ends up on top.
  for (const a of [...alerts].reverse()) prependAlert(a);
}

function prependAlert(a) {
  const ul = document.getElementById("alerts");
  const empty = ul.querySelector(".empty");
  if (empty) empty.remove();
  const li = document.createElement("li");
  if (a.id != null) {
    li.dataset.id = a.id;
    li.classList.add("alert-item");
  }
  li.innerHTML = `<strong>${a.ticker}</strong> - ${a.message}<span class="ts">${new Date(a.triggered_at).toLocaleString()}</span>`;
  ul.prepend(li);
}

document.getElementById("alerts").addEventListener("click", (event) => {
  const li = event.target.closest("li[data-id]");
  if (li) openAlertModal(li.dataset.id);
});

function applyPriceUpdate(msg) {
  const tr = rows[msg.ticker];
  if (!tr) return;
  tr.querySelector(".price").textContent = fmtNum(msg.price);
  if (typeof msg.volume === "number") {
    tr.querySelector(".volume").textContent = msg.volume.toLocaleString();
  }
  if (typeof msg.spread === "number") {
    tr.querySelector(".spread").textContent = fmtNum(msg.spread, 3);
  }
  const zEl = tr.querySelector(".z");
  const label = msg.kind && msg.kind !== "none" ? `${fmtNum(msg.z_score, 1)} (${msg.kind})` : fmtNum(msg.z_score, 1);
  zEl.textContent = label;
  zEl.className = "z" + (msg.z_score >= 3 ? " zscore-hot" : "");
  tr.classList.remove("flash");
  void tr.offsetWidth; // restart the animation
  tr.classList.add("flash");
  refreshBaseline(msg.ticker);
}

function connect() {
  const scheme = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${scheme}//${location.host}/ws/alerts`);
  const status = document.getElementById("conn");

  ws.onopen = () => { status.textContent = "live"; status.className = "status connected"; };
  ws.onclose = () => {
    status.textContent = "reconnecting…";
    status.className = "status disconnected";
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "price_update") applyPriceUpdate(msg);
    else if (msg.type === "alert") { prependAlert({ ...msg, triggered_at: new Date().toISOString() }); applyPriceUpdate(msg); }
  };
}

function openModal(html) {
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

document.getElementById("modal-overlay").addEventListener("click", (event) => {
  if (event.target.id === "modal-overlay") closeModal();
});

const RANGES = ["1D", "1W", "1M", "3M", "1Y"];
let tickerChart = null;

async function openTickerModal(ticker) {
  openModal(`
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>${ticker}</h3>
    <div>${RANGES.map((r) => `<button class="range-btn" data-range="${r}">${r}</button>`).join("")}</div>
    <canvas id="ticker-chart" height="180"></canvas>
    <div class="modal-section" id="ticker-fundamentals">
      <div class="loading-block"><span class="spinner"></span>Loading fundamentals…</div>
    </div>
  `);
  document.querySelectorAll(".range-btn").forEach((btn) => {
    btn.addEventListener("click", () => loadTickerChart(ticker, btn.dataset.range, btn));
  });
  loadTickerChart(ticker, "1M", document.querySelector('.range-btn[data-range="1M"]'));
  loadTickerFundamentals(ticker);
}

async function loadTickerChart(ticker, range, btnEl) {
  document.querySelectorAll(".range-btn").forEach((b) => b.classList.remove("active"));
  if (btnEl) btnEl.classList.add("active");

  const data = await (await fetch(`/tickers/${ticker}/history?range=${range}`)).json();
  const labels = data.points.map((p) => fmtProviderDate(p.date));
  const values = data.points.map((p) => p.close);

  const ctx = document.getElementById("ticker-chart");
  if (!ctx) return; // modal may have closed while this was in flight
  if (tickerChart) tickerChart.destroy();
  tickerChart = new Chart(ctx, {
    type: "line",
    data: { labels, datasets: [{ label: ticker, data: values, borderColor: "#ffa500", tension: 0.1, pointRadius: 0 }] },
    options: {
      responsive: true,
      interaction: { mode: "index", intersect: false },
      scales: {
        x: { ticks: { color: "#7a7a72", maxTicksLimit: 8 }, grid: { color: "#2a2a2a" } },
        y: { ticks: { color: "#7a7a72" }, grid: { color: "#2a2a2a" } },
      },
      plugins: { legend: { display: false } },
    },
  });
}

async function loadTickerFundamentals(ticker) {
  const el = document.getElementById("ticker-fundamentals");
  const data = await (await fetch(`/tickers/${ticker}/fundamentals`)).json();
  if (!el) return; // modal may have closed while this was in flight
  const divRows = data.dividends
    .map((d) => `<tr><td>${d.ex_date}</td><td>$${d.amount.toFixed(2)}</td></tr>`)
    .join("");
  const eps = data.earnings.eps_estimate != null ? ` (est. EPS $${data.earnings.eps_estimate.toFixed(2)})` : "";
  el.innerHTML = `
    <p><strong>Next earnings:</strong> ${data.earnings.next_date ?? "-"}${eps}</p>
    <div class="mini-card">
      <strong>Recent dividends</strong>
      <table><thead><tr><th>Ex-date</th><th>Amount</th></tr></thead>
      <tbody>${divRows || '<tr><td colspan="2">None</td></tr>'}</tbody></table>
    </div>
  `;
}

let alertChart = null;

function renderContextTable(context) {
  if (!context) return "<p>No context recorded for this alert.</p>";
  const rows = Object.entries(context)
    .map(([k, v]) => `<tr><td>${k}</td><td>${typeof v === "object" ? JSON.stringify(v) : v}</td></tr>`)
    .join("");
  return `<table><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function openAlertModal(alertId) {
  openModal(`
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>Alert #${alertId}</h3>
    <div id="alert-body">
      <div class="loading-block" style="min-height: 320px;"><span class="spinner"></span>Loading alert details…</div>
    </div>
  `);
  const data = await (await fetch(`/alerts/${alertId}`)).json();
  const body = document.getElementById("alert-body");
  if (!body) return; // modal may have closed while this was in flight

  body.innerHTML = `
    <p><strong>${data.ticker}</strong> - ${data.message}</p>
    <p class="ts">${new Date(data.triggered_at).toLocaleString()}</p>
    <canvas id="alert-chart" height="140"></canvas>
    <div class="modal-section">${renderContextTable(data.context)}</div>
  `;

  const ctx = document.getElementById("alert-chart");
  const labels = data.nearby_prices.map((p) => fmtEasternDate(p.date));
  const values = data.nearby_prices.map((p) => p.close);
  if (alertChart) alertChart.destroy();
  alertChart = new Chart(ctx, {
    type: "line",
    data: { labels, datasets: [{ label: data.ticker, data: values, borderColor: "#ff4136", tension: 0.1, pointRadius: 2 }] },
    options: {
      responsive: true,
      interaction: { mode: "index", intersect: false },
      scales: {
        x: { ticks: { color: "#7a7a72", maxTicksLimit: 6 }, grid: { color: "#2a2a2a" } },
        y: { ticks: { color: "#7a7a72" }, grid: { color: "#2a2a2a" } },
      },
      plugins: { legend: { display: false } },
    },
  });
}

async function renderEditTickersBody() {
  const body = document.getElementById("edit-tickers-body");
  if (!body) return;
  const data = await (await fetch("/tickers")).json();
  const tickers = data.tickers;
  const atMin = tickers.length <= 1;
  const atMax = tickers.length >= 5;

  const rows = tickers
    .map(
      (t) => `
    <li style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);">
      <span style="color:var(--amber);font-weight:700;">${t}</span>
      <button class="test-btn remove-ticker-btn" data-ticker="${t}" ${atMin ? "disabled" : ""}>Remove</button>
    </li>`
    )
    .join("");

  body.innerHTML = `
    <ul style="list-style:none;padding:0;margin:0 0 1rem 0;">${rows}</ul>
    <div style="display:flex;gap:0.5rem;">
      <input id="new-ticker-input" placeholder="e.g. AMD" style="flex:1;font-family:inherit;background:var(--bg);border:1px solid var(--border-amber);color:var(--text);border-radius:2px;padding:4px 8px;" ${atMax ? "disabled" : ""}>
      <button class="test-btn" id="add-ticker-btn" ${atMax ? "disabled" : ""}>Add</button>
    </div>
    ${atMax ? '<p style="color:var(--text-dim);font-size:0.8rem;margin-top:0.5rem;">Maximum of 5 tickers reached - remove one to add another.</p>' : ""}
    <div id="edit-tickers-status" style="margin-top:0.5rem;font-size:0.85rem;"></div>
  `;

  body.querySelectorAll(".remove-ticker-btn").forEach((btn) => {
    btn.addEventListener("click", () => removeTicker(btn.dataset.ticker));
  });
  const addBtn = document.getElementById("add-ticker-btn");
  if (addBtn) addBtn.addEventListener("click", addTicker);
}

async function addTicker() {
  const input = document.getElementById("new-ticker-input");
  const status = document.getElementById("edit-tickers-status");
  const ticker = input.value.trim().toUpperCase();
  if (!ticker) return;
  status.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span> Validating - checking we can fetch data for this symbol…';
  status.style.color = "var(--text-dim)";
  const res = await fetch(`/tickers/${ticker}`, { method: "POST", headers: { "X-Debug-Token": DEBUG_TOKEN } });
  const result = await res.json();
  if (!res.ok) {
    status.textContent = result.detail || "Failed to add ticker.";
    status.style.color = "var(--red)";
    return;
  }
  await renderEditTickersBody();
  document.getElementById("edit-tickers-status").textContent = `Added ${ticker}.`;
  document.getElementById("edit-tickers-status").style.color = "var(--green)";
  initTable();
}

async function removeTicker(ticker) {
  const res = await fetch(`/tickers/${ticker}`, { method: "DELETE", headers: { "X-Debug-Token": DEBUG_TOKEN } });
  const result = await res.json();
  if (!res.ok) {
    await renderEditTickersBody();
    const status = document.getElementById("edit-tickers-status");
    if (status) {
      status.textContent = result.detail || "Failed to remove ticker.";
      status.style.color = "var(--red)";
    }
    return;
  }
  await renderEditTickersBody();
  initTable();
}

async function openEditTickersModal() {
  openModal(`
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>Edit Tracked Tickers</h3>
    <div id="edit-tickers-body">
      <div class="loading-block" style="min-height: 160px;"><span class="spinner"></span>Loading…</div>
    </div>
  `);
  renderEditTickersBody();
}

async function openSettingsModal() {
  openModal(`
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>Alert Thresholds</h3>
    <div id="settings-body">
      <div class="loading-block" style="min-height: 200px;"><span class="spinner"></span>Loading settings…</div>
    </div>
  `);
  const config = await (await fetch("/config")).json();
  const body = document.getElementById("settings-body");
  if (!body) return;

  body.innerHTML = `
    <table>
      <tr><td>Z-score threshold</td><td><input id="cfg-zscore" type="number" step="0.1" value="${config.anomaly_zscore_threshold}"></td></tr>
      <tr><td>Stale-quote threshold</td><td><input id="cfg-stale" type="number" step="1" value="${config.stale_threshold}"></td></tr>
      <tr><td>Cooldown (minutes)</td><td><input id="cfg-cooldown" type="number" step="1" value="${config.alert_cooldown_minutes}"></td></tr>
      <tr><td>Reconciliation tolerance</td><td><input id="cfg-recon" type="number" step="0.01" value="${config.reconciliation_tolerance}"></td></tr>
    </table>
    <div class="modal-section">
      <button class="test-btn" id="cfg-save">Save</button>
      <span id="cfg-status" style="margin-left: 0.5rem; font-size: 0.85rem;"></span>
    </div>
  `;

  document.getElementById("cfg-save").addEventListener("click", async () => {
    const status = document.getElementById("cfg-status");
    const params = new URLSearchParams({
      anomaly_zscore_threshold: document.getElementById("cfg-zscore").value,
      stale_threshold: document.getElementById("cfg-stale").value,
      alert_cooldown_minutes: document.getElementById("cfg-cooldown").value,
      reconciliation_tolerance: document.getElementById("cfg-recon").value,
    });
    const res = await fetch(`/config?${params}`, { method: "POST", headers: { "X-Debug-Token": DEBUG_TOKEN } });
    const result = await res.json();
    status.textContent = res.ok ? "Saved." : result.detail || "Failed to save.";
    status.style.color = res.ok ? "var(--green)" : "var(--red)";
  });
}

document.getElementById("ticker-rows").addEventListener("click", async (event) => {
  const link = event.target.closest(".ticker-link");
  if (link) {
    openTickerModal(link.dataset.ticker);
    return;
  }
  const btn = event.target.closest(".test-btn");
  if (!btn) return;
  const ticker = btn.dataset.ticker;
  const kind = btn.dataset.kind;
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = "Triggering…";
  try {
    const res = await fetch(`/debug/test-alert/${ticker}?kind=${kind}`, {
      method: "POST",
      headers: { "X-Debug-Token": DEBUG_TOKEN },
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      alert(body.detail || "Test alert failed - check server logs.");
    }
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
});

initTable();
loadAlerts();
connect();
</script>
</body>
</html>
